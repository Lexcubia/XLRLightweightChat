name: XLRHopper
version: 1.0.0
main: xlingran.Shan
api-version: 1.21.1
author: Shan
description: 高级漏斗传输插件

commands:
  xlrhopper:
    description: XLRHopper 漏斗模板
    usage: /xlrhopper <mode|create mode <名称>|edit mode <名称>>
    # 子命令权限在 HopperCommand 内分别校验，勿在此绑定单一 permission

permissions:
  xlrhopper.create.mode:
    description: 创建过滤模板 (create mode)
    default: op
  xlrhopper.edit.mode:
    description: 编辑已有过滤模板 (edit mode)
    default: op
  xlrhopper.mode:
    description: 打开漏斗模板列表 (mode)
    default: op
