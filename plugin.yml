name: XLRHopper
version: 1.3.0
main: xlingran.Shan
api-version: 1.21.1
author: Shan
description: 高级漏斗传输插件

softdepend:
  - DecentHolograms

commands:
  xlrhopper:
    description: XLRHopper 漏斗模板
    usage: /xlrhopper <help|mode|create mode <名称>|edit mode <名称>|give <玩家|%player%> <等级> [数量]|reload>

permissions:
  xlrhopper.admin:
    description: XLRHopper 管理员（拥有全部权限，含 reload / give）
    default: op
    children:
      xlrhopper.help: true
      xlrhopper.mode: true
      xlrhopper.create.mode: true
      xlrhopper.edit.mode: true
      xlrhopper.give: true
  xlrhopper.help:
    description: 查看 XLRHopper 帮助 (help)
    default: true
  xlrhopper.mode:
    description: 打开漏斗模板列表 (mode)
    default: true
  xlrhopper.create.mode:
    description: 创建过滤模板 (create mode)
    default: true
  xlrhopper.edit.mode:
    description: 编辑已有过滤模板 (edit mode)
    default: true
  xlrhopper.give:
    description: 给予等级漏斗 (give)
    default: op
