# 插件版本 不要修改它
Version: 1.3.0
# 更新检测
check-upddate: true
# 启用的世界
World:
    - "world"
    - "world_nether"
    - "world_the_end"

# 这个是优化的参数，非必要可以不用管
# 大部分tick设置都必须要是8的倍数
XLRHopper:
    # 队列上限，防海量漏斗撑爆内存
    max-queue-limit: 5000
    # 单轮次8tick最多处理漏斗任务
    per-tick-max-process: 256
    # 空漏斗休眠，不进队列，跳过检测
    sleep-empty-hopper: true
    # 满漏斗休眠，不进队列，跳过检测
    sleep-full-container: true
    # 漏斗休眠后多少Tick再校验，大幅减少无用事件
    sleep-tick: 16
    # 漏斗多少Tick后会进入深度睡眠
    # 不用担心漏斗永远不会动，插件使用P0轮询事件驱动
    # 只要有东西就会醒来
    deep-sleep-tick: 80
    # 区块卸载时清理漏斗数据(可以防止内存泄露)
    clear-on-chunk-unload: true
    # 漏斗队列上限，设置0为关闭
    max-queue-size: 8192
    # 队列溢出后，true 为等待下一周期重试，false 丢弃本次入队
    # 一般不用去管它
    queue-overflow-policy: true

# 全息显示
Hologram:
    # 启用或关闭全息显示，关闭后全息显示将无法使用
    enable: true
    # 全息显示刷新间隔,单位 秒
    refresh-time: 1
    # 全息显示间距
    line-height: 0.3
    # 全息显示高度
    height: 1
    # 玩家距离多少格内才会更新全息显示
    update-range: 48
    # 玩家距离多少格内才能看见全息显示
    display-range: 48
    # 全息显示文字
    hologram-lines:
        - "&a漏斗等级: %hoppername%"
        - "&a当前使用模板: %template%"
        - "&7模式: %mode%"
        - "&7过滤: %enchan% 种附魔"
        - "&7最低耐久度: %durability%"

# 模板开关 true为开启，false为关闭
Gui:
    # 是否启用自动合成功能
    auto-craft-enable: true
    # 合成时间
    craft-tick: 20
    # 是否启用自动熔炼功能
    auto-smelt-enable: true
    # 熔炼时间
    smelt-tick: 100
    # 是否启用自动销毁功能
    destroy-unmatched-items: true
    # 是否启用附魔过滤功能
    filter-enchan: true
    # 是否启用耐久过滤功能
    filter-durability: true
    # 是否启用批量设置漏斗模板
    batch-set: true
    # 对单独漏斗设置
    # 红石开关白名单功能
    redstone-toggle: true
    # 是否启用反向吸取功能
    reverse-hopper: true
    
# 设置相关
Setting:
    # 最大模板数，不能超过 27 个
    max-template-count: 27
    # Gui点击冷却(毫秒)
    gui-click-cooldown: 200
    # 是否启用漏斗爆炸保护
    explosion-hopper: true

# 命令相关
Command:
    reload:
        - "&a配置已重载"
        - "&a加载了 %status% 种漏斗"
    help:
        - "&7=====&a[XLRHopper]&7====="
        - "&7"