# 模板设置Gui
TemplateSet:
    # Gui标题名称
    name: "&e模板设置: &b%modename%"
    # 没有被占用时填充物品
    Filler:
        # 填充物品ID
        material: BLACK_STAINED_GLASS_PANE
    # 自动合成按钮
    AutoCrafting:
        # 所在格子位置，不能超过5行
        slot: 10
        # 展示物品ID
        material: CRAFTING_TABLE
        # 该按钮名称
        name: "&e自动合成"
        # 该物品描述
        Lore:
            - "&a当前状态: %toggle%"
            - "&7左键 开/关"
            - "&7右键 打开配置界面"
    Break:
        slot: 12
        material: GRASS_BLOCK
        name: "&e自动销毁"
        Lore:
            - "&a当前状态: %toggle%"
            - "&7左键或右键点击切换"
    FilterItem:
        slot: 14
        material: CHEST
        name: "&e过滤物品"
        Lore:
            - "&a将过滤你添加的物品"
    FilterMode:
        slot: 16
        material: REDSTONE_BLOCK
        name: "&e过滤模式"
        Lore:
            - "&7仅作用于过滤物品"
            - "&8当前模式: %filtermode%"
    FilterEnchant:
        slot: 28
        material: ENCHANTED_BOOK
        name: "&e附魔过滤"
        Lore:
            - "&7点击进入附魔属性过滤"
    FilterDurability:
        slot: 30
        material: EMERALD
        name: "&e耐久过滤"
        # 物品未设置前描述
        Lore:
            - "&7点击设置最低剩余耐久"
        # 物品设置好描述
        SetLore:
            - "&7点击设置最低剩余耐久"
            - "&a过滤耐久度: &b%Durability%"
    AutoSmelt:
        slot: 32
        material: FURNACE
        name: "&e自动熔炼"
        Lore:
            - "&a当前状态: %toggle%"
            - "&7左键 开/关"
            - "&7右键 打开配置界面"
    Batch:
        slot: 34
        material: ENDER_EYE
        name: "&e批量设置"
        Lore:
            - "&7点击后为漏斗批量套用本模板"

# 漏斗模板Gui
HopperTemplateList:
    name: "&6漏斗模板"
    # 未开启时显示
    Template:
        material: NAME_TAG
        name: "&a%Template%"
        Lore:
            - "&7左键 开/关"
            - "&7右键 编辑"
            - "&a当前模式: %toggle%"
    # 开启后显示
    SetTemplate:
        material: NAME_TAG
        enchant: true
        name: "&a%Template%"
        Lore:
            - "&7左键 开/关"
            - "&7右键 编辑"
            - "&a当前模式: %toggle%"
# 过滤附魔属性Gui
FilterEnchantGui:
    name: "&6过滤附魔属性"
    # 未设置前显示Gui
    Enchant:
        material: BOOK
        name: "&e%Enchant%"
        Lore:
            - "&7左键 设置最低等级"
    # 设置后显示Gui
    SetEnchant:
        material: ENCHANTED_BOOK
        name: "&e%Enchant%"
        Lore:
            - "&a当前过滤: &e%Enchant% %EnchantLevel%"
            - "&7左键 修改等级"
            - "&7右键 清除过滤"
# 单独对漏斗设置Gui
HopperSetting:
    name: "&e漏斗设置"
    Filler:
        material: BLACK_STAINED_GLASS_PANE
    Redstone:
        slot: 10
        material: REDSTONE
        name: "&e红石开关名单"
        Lore:
            - "&a当前状态: %toggle%"
            - "&7充能=白名单 未充能=黑名单"
            - "&7左键或右键点击切换"
    Reverse:
        slot: 12
        material: GOLD_INGOT
        name: "&e反向吸取"
        Lore:
            - "&a当前状态: %toggle%"
            - "&7左键或右键点击切换"

# 自动合成Gui
Auto-Crafting:
    # 最少1行，最大6行
    rows: 6
    name: "&6自动合成"
# 过滤的物品Gui
Filter-Item:
    rows: 6
    name: "&6过滤的物品"
# 自动熔炼Gui
Auto-Furnace:
    rows: 6
    name: "&6自动熔炼"

# 开和关变量
toggle:
    on: "&a开"
    off: "&c关"
# 白名单和黑名单切换变量
filtermode:
    on: "&a白名单模式"
    off: "&c黑名单模式"

