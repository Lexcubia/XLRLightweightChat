# 模板设置Gui
TemplateSet:
    # Gui标题名称
    name: "&6模板设置: &f%modename%"
    # 没有被占用时填充物品
    Filler:
        # 填充物品ID
        material: BLACK_STAINED_GLASS_PANE
    # 自动合成按钮
    AutoCrafting:
        # 所在格子位置，不能超过5行
        slot: 10
        # 展示物品ID
        material: CRAFTING_TABLE
        # 该按钮名称
        name: "&e自动合成"
        # 该物品描述
        Lore:
            - "&3● &7左键点击 开启/关闭"
            - "&3● &7右键打开 合成仓库"
            - "&2● &7将你要合成的物品放入合成仓库里面"
            - "&2● &7将自动合成你放置仓库里面的物品"
            - "&2● &6自动合成&7和&6自动熔炼&7只能二选一"
            - ""
            - "&3● &7当前状态: %toggle%"
    Break:
        slot: 12
        material: GRASS_BLOCK
        name: "&e自动销毁"
        Lore:
            - "&3● &7左键点击 开启/关闭"
            - "&2● &7漏斗会吸取所有的物品"
            - "&2● &7不符合的物品将自动销毁"
            - ""
            - "&3● &7当前状态: %toggle%"
    FilterItem:
        slot: 14
        material: CHEST
        name: "&e过滤物品"
        Lore:
            - "&3● &7左键点击 进入过滤仓库"
            - "&2● &7将你要过滤的物品放进即可"
            - "&2● &7此选项与&6过滤模式&7互相绑定"
    FilterMode:
        slot: 16
        material: REDSTONE_BLOCK
        name: "&e过滤模式"
        Lore:
            - "&3● &7左键点击 切换模式"
            - "&3● &7白名单: &6过滤仓库添加以外的物品"
            - "&3● &7黑名单: &6过滤仓库添加的物品"
            - "&2● &7此选项与&6过滤物品&7互相绑定"
            - ""
            - "&3● &7当前模式: %filtermode%"
    FilterEnchant:
        slot: 28
        material: ENCHANTED_BOOK
        name: "&e附魔过滤"
        Lore:
            - "&3● &7左键打开 过滤菜单"
            - "&2● &7在里面选择你要过滤的附魔属性"
            - "&2● &7低于设置的附魔属性都会被过滤"
    FilterDurability:
        slot: 30
        material: EMERALD
        name: "&e耐久过滤"
        # 物品未设置前描述
        Lore:
            - "&2● &7点击设置最低剩余耐久"
            - "&2● &7低于你设置的耐久度都会被过滤"
        # 物品设置好描述
        SetLore:
            - "&2● &7最低耐久度: &6%Durability%"
    AutoSmelt:
        slot: 32
        material: FURNACE
        name: "&e自动熔炼"
        Lore:
            - "&3● &7左键点击 开启/关闭"
            - "&3● &7右键打开 熔炼界面"
            - "&2● &7将你要熔炼的物品放入仓库里面"
            - "&2● &7将自动熔炼成你放置仓库里面的物品"
            - "&2● &6自动合成&7和&6自动熔炼&7只能二选一"
            - ""
            - "&3● &7当前状态: %toggle%"
    Batch:
        slot: 34
        material: ENDER_EYE
        name: "&e批量设置"
        Lore:
            - "&3● &7左键点击 批量设置模式"
            - "&2● &7进人模式后，点击的漏斗会套用该模板"

# 漏斗模板Gui
HopperTemplateList:
    name: "&6漏斗模板仓库"
    # 未开启时显示
    Template:
        material: NAME_TAG
        name: "&6模板名称: &f%Template%"
        Lore:
            - "&3● &7左键点击 开启/关闭"
            - "&3● &7右键点击 编辑模式"
            - ""
            - "&3● &7当前模式: %toggle%"
    # 开启后显示
    SetTemplate:
        material: NAME_TAG
        enchant: true
        name: "&6模板名称: &f%Template%"
        Lore:
            - "&3● &7左键点击 开启/关闭"
            - "&3● &7右键点击 编辑模式"
            - ""
            - "&3● &7当前模式: %toggle%"
# 过滤附魔属性Gui
FilterEnchantGui:
    name: "&6附魔属性"
    # 未设置前显示Gui
    Enchant:
        material: BOOK
        name: "&e%Enchant%"
        Lore:
            - "&3● &7左键点击 设置最低属性"
    # 设置后显示Gui
    SetEnchant:
        material: ENCHANTED_BOOK
        name: "&e%Enchant%"
        Lore:
            - "&3● &7左键点击 重新设置"
            - "&3● &7右键点击 清除设置"
            - ""
            - "&3● &7过滤属性: &6%Enchant%"
            - "&3● &7最低等级: &6%EnchantLevel%"
            - "&2● &7低于设置等级的附魔都会被过滤"
# 单独对漏斗设置Gui
HopperSetting:
    name: "&6单漏斗设置"
    Filler:
        material: BLACK_STAINED_GLASS_PANE
    Redstone:
        slot: 10
        material: REDSTONE
        name: "&e红石开关名单"
        Lore:
            - "&3● &7左键点击 开启/关闭 此功能"
            - "&3● &7红石激活: &6白名单模式"
            - "&3● &7红石关闭: &6黑名单模式"
            - "&2● &7开启后过滤模式将由红石接管"
            - ""
            - "&3● &7功能状态: %toggle%"
            - "&3● &7当前模式: %stonemode%"
    Reverse:
        slot: 12
        material: GOLD_INGOT
        name: "&e反向吸取"
        Lore:
            - "&3● &7左键点击 开启/关闭"
            - "&2● &7开启后漏斗会从下往上传输"
            - ""
            - "&3● &7当前状态: %toggle%"
    FloatOverlay:
        slot: 14
        material: EMERALD
        name: "&e全息开关"
        Lore:
            - "&3● &7左键点击 开启/关闭"
            - "&2● &7开启后会显示漏斗详细信息"
            - ""
            - "&3● &7当前状态: %toggle%"

# 自动合成Gui
Auto-Crafting:
    rows: 6
    name: "&6自动合成"
# 自动熔炼Gui
Auto-Furnace:
    rows: 6
    name: "&6自动熔炼"
# 过滤的物品Gui
Filter-Item:
    rows: 6
    name: "&6过滤物品"

# 开和关变量（替换 Lore 中 %toggle%）
toggleon: "&a开启"
toggleoff: "&c关闭"
# 这个会对应 Config.yml 里面的 %mode% 的变量
# 白名单和黑名单切换变量（替换 Lore 中 %filtermode%）
filtermodeon: "&a白名单模式"
filtermodeoff: "&c黑名单模式"
filtermodedisabled: "&6功能已关闭"
# 红石白名单和黑名单切换变量（替换 Lore 中 %stonemode%）
stonemodeon: "&a红石白名单模式"
stonemodeoff: "&c红石黑名单模式"
stonemodeodisabled: "&6功能已关闭"

