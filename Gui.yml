# XLRHopper GUI 配置（预置，勿用代码生成）
# 存储类 GUI 可配置 rows（最少 1）；其余界面行数由插件硬编码

toggle:
  on: "&a开"
  off: "&c关"

filtermode:
  on: "&a白名单模式"
  off: "&c黑名单模式"

# 附魔 registry key（小写）→ 中文名
enchant-names:
  aqua_affinity: "水下速掘"
  bane_of_arthropods: "节肢杀手"
  binding_curse: "绑定诅咒"
  blast_protection: "爆炸保护"
